<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SEO Admin Dashboard — API Only</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; color: #333; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
    a    { color: #0066cc; }
  </style>
</head>
<body>
  <h1>This is a headless CMS</h1>
  <p>Page: <strong>{{ page.title }}</strong></p>
  <p>Content is served via the REST API — there is no HTML frontend on this server.</p>
  <ul>
    <li><a href="/api/v2/pages/{{ page.id }}/?fields=*">View this page in the API</a></li>
    <li><a href="/api/v2/">Browse the API</a></li>
    <li><a href="/admin/">Wagtail Admin</a></li>
  </ul>
</body>
</html>
