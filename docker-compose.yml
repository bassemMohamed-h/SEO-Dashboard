services:
  backend:
    build:
      context: ./admindashboard
      dockerfile: Dockerfile
    volumes:
      - ./admindashboard:/app:cached
      - ./admindashboard/db.sqlite3:/app/db.sqlite3
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings.dev
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./PrimeShield
      dockerfile: Dockerfile
    volumes:
      - ./PrimeShield:/usr/src/app:cached
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_WAGTAIL_API_URL=http://backend:8000/api/v2
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    depends_on:
      - backend
